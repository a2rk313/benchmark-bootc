---
name: Build disk images

on:
  workflow_dispatch:
    inputs:
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64
  push:
    tags:
      - "thesis-*"

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build disk images
    runs-on: ${{ inputs.platform == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}

    strategy:
      fail-fast: false
      matrix:
        disk-type: ["qcow2", "anaconda-iso"]

    permissions:
      contents: write
      packages: read
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          DISK_TYPE=$(echo "${{ matrix.disk-type }}" | tr ' ' '-')
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV
          echo "DISK_TYPE=${DISK_TYPE}" >> $GITHUB_ENV
          echo "USER_UID=${USER_UID}" >> $GITHUB_ENV
          echo "USER_GID=${USER_GID}" >> $GITHUB_ENV

      - name: Install dependencies (arm64)
        if: inputs.platform == 'arm64'
        run: |
          sudo apt update -y
          sudo apt install -y podman

      - name: Maximize build space
        if: inputs.platform != 'arm64'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build disk images
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ${{ matrix.disk-type == 'anaconda-iso' && './disk_config/iso.toml' || './disk_config/disk.toml' }}
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: ${{ matrix.disk-type }}
          rootfs: ${{ matrix.disk-type == 'anaconda-iso' && 'ext4' || 'btrfs' }}

      - name: Prepare release assets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          cd "${{ steps.build.outputs.output-directory }}"
          PLATFORM="${{ inputs.platform }}"

          # Rename files for cleaner output
          for f in *.iso; do
            if [ -f "$f" ]; then
              mv "$f" "thesis-${PLATFORM}.iso"
            fi
          done
          for f in *.qcow2; do
            if [ -f "$f" ]; then
              mv "$f" "thesis-${PLATFORM}.qcow2"
            fi
          done

          # Generate checksum
          sha256sum * > SHA256SUMS

          # Split only ISO files (GitHub has 2GB limit)
          for iso in thesis-*.iso; do
            if [ -f "$iso" ]; then
              echo "Splitting $iso"
              split -b 1900M "$iso" "$iso.part-"
              rm "$iso"
            fi
          done

          # Add instructions for reassembly
          cat <<EOF > README.txt
          Reassemble the ISO:

          cat thesis-*.iso.part-* > thesis.iso

          Verify integrity:

          sha256sum -c SHA256SUMS
          EOF

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.build.outputs.output-directory }}/thesis-*.iso.part-*
            ${{ steps.build.outputs.output-directory }}/SHA256SUMS
            ${{ steps.build.outputs.output-directory }}/README.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload disk images to Job Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.build.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true