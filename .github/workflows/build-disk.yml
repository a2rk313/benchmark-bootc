---
name: Build disk images

on:
  workflow_dispatch:
    inputs:
      platform:
        required: true
        type: choice
        options:
          - amd64
          - arm64
      upload-release:
        description: "Upload to GitHub Release"
        required: false
        default: false
        type: boolean

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build disk images
    runs-on: ${{ (inputs.platform == 'arm64') && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        disk-type: ["qcow2", "anaconda-iso"]
    permissions:
      contents: write
      packages: read
    steps:
      - name: Prepare environment
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          DISK_TYPE=$(echo "${{ matrix.disk-type }}" | tr ' ' '-')
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME,,}"         >> $GITHUB_ENV
          echo "DISK_TYPE=${DISK_TYPE}"             >> $GITHUB_ENV
          echo "USER_UID=${USER_UID}"               >> $GITHUB_ENV
          echo "USER_GID=${USER_GID}"               >> $GITHUB_ENV

      - name: Install dependencies (arm64)
        if: (inputs.platform || 'amd64') == 'arm64'
        run: |
          sudo apt update -y
          sudo apt install -y podman

      - name: Maximize build space
        if: (inputs.platform || 'amd64') != 'arm64'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Build disk images
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          config-file: ${{ matrix.disk-type == 'anaconda-iso' && './disk_config/iso.toml' || './disk_config/disk.toml' }}
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: ${{ matrix.disk-type }}
          rootfs: ${{ matrix.disk-type == 'anaconda-iso' && 'ext4' || 'btrfs' }}

      - name: Prepare release assets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          PLATFORM="${{ inputs.platform || 'amd64' }}"
          OUT="${{ steps.build.outputs.output-directory }}"

          # Flatten: move all files from subdirectories up to OUT
          find "$OUT" -mindepth 2 -type f -exec mv {} "$OUT/" \;
          # Remove the now-empty subdirectories
          find "$OUT" -mindepth 1 -type d -exec rm -rf {} + 2>/dev/null || true

          cd "$OUT"

          # Rename files to include platform and type in the name
          for f in *.iso; do
            [ -f "$f" ] && mv "$f" "thesis-${PLATFORM}-${{ matrix.disk-type }}.iso"
          done
          for f in *.qcow2; do
            [ -f "$f" ] && mv "$f" "thesis-${PLATFORM}-${{ matrix.disk-type }}.qcow2"
          done

          # Checksum all files before splitting
          sha256sum $(find . -maxdepth 1 -type f ! -name SHA256SUMS) > SHA256SUMS

          # Split ISOs into <1900MB chunks (GitHub Release limit is 2GB per file)
          for iso in thesis-*.iso; do
            if [ -f "$iso" ]; then
              echo "Splitting $iso..."
              split -b 1900M "$iso" "${iso}.part-"
              rm "$iso"
              echo "Parts created:"
              ls -lh "${iso}.part-"*
            fi
          done

          # Reassembly instructions for reviewers
          cat <<'EOF' > README.txt
          Reassemble the ISO
          ------------------
          cat thesis-*.iso.part-* > thesis.iso

          Verify integrity
          ----------------
          sha256sum -c SHA256SUMS

          Note: the SHA256SUMS file contains the checksum of the original
          pre-split ISO, so run it against the reassembled file.
          EOF

          echo "--- Final asset list ---"
          ls -lh

      - name: Upload to GitHub Release
        if: inputs.upload-release == true
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## Thesis disk images

            **Platform:** ${{ inputs.platform || 'amd64' }}
            **Type:** ${{ matrix.disk-type }}

            ### Reassemble the ISO
            ```bash
            cat thesis-*.iso.part-* > thesis.iso
            sha256sum -c SHA256SUMS
            ```
          files: |
            ${{ steps.build.outputs.output-directory }}/thesis-*.iso.part-*
            ${{ steps.build.outputs.output-directory }}/thesis-*.qcow2
            ${{ steps.build.outputs.output-directory }}/SHA256SUMS
            ${{ steps.build.outputs.output-directory }}/README.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Job Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: disk-image-${{ matrix.disk-type }}-${{ inputs.platform || 'amd64' }}
          path: ${{ steps.build.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true